name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '23 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Security
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Run security verification
        run: mise run security
