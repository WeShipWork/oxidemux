name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    env:
      MISE_CARGO_HOME: ${{ github.workspace }}/.cargo
      MISE_RUSTUP_HOME: ${{ github.workspace }}/.rustup

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Install toolchain
        run: mise install --force --jobs=1 rust

      - name: Run repository verification
        run: mise run ci

      - name: Run hk checks
        run: mise run hk-check

      - name: Validate OpenSpec PR evidence
        if: github.event_name == 'pull_request'
        run: mise run openspec-validate

  cross-platform-check:
    name: Cross-platform check (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    env:
      MISE_CARGO_HOME: ${{ github.workspace }}/.cargo
      MISE_RUSTUP_HOME: ${{ github.workspace }}/.rustup
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Install toolchain
        run: mise install --force --jobs=1 rust

      - name: Run repository verification
        run: mise run ci
