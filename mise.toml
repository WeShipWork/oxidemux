[tools]
rust = { version = "1.95.0", profile = "default", components = "rustfmt,clippy" }
hk = "1.36.0"
pkl = "latest"
typos = "1.45.2"
gitleaks = "latest"
rumdl = "latest"
"cargo:cargo-deny" = "0.19.0"
"cargo:cargo-audit" = "0.22.1"

[tasks.rust-components]
run = "rustup component add rustfmt clippy --toolchain 1.95.0"

[tasks.fmt]
run = "cargo fmt --all -- --check"

[tasks.fmt-fix]
run = "cargo fmt --all"

[tasks.check]
run = "cargo check --all-targets --all-features"

[tasks.clippy]
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.test]
run = "cargo test --all-targets --all-features"

[tasks.doc]
env = { RUSTDOCFLAGS = "-D warnings" }
run = "cargo doc --workspace --no-deps"

[tasks.deny]
run = "cargo deny --workspace check advisories bans licenses sources"

[tasks.audit]
run = "cargo audit --deny warnings"

[tasks.security]
run = [
    "mise run deny",
    "mise run audit",
]

[tasks.hk-check]
run = "hk check --all"

[tasks.hk-install]
run = "hk install"

[tasks.hk-pre-commit]
run = "hk run pre-commit"

[tasks.openspec-validate]
run = "scripts/ci/validate-openspec-pr.sh"

[tasks.ci]
run = [
    "mise run rust-components",
    "mise run fmt",
    "mise run check",
    "mise run clippy",
    "mise run test",
    "mise run doc",
]
