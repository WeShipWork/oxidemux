[tools]
rust = { version = "1.95.0", profile = "default", components = "rustfmt,clippy" }
hk = "1.36.0"
pkl = "latest"
typos = "latest"
gitleaks = "latest"
rumdl = "latest"

[tasks.fmt]
run = "cargo fmt --all -- --check"

[tasks.fmt-fix]
run = "cargo fmt --all"

[tasks.check]
run = "cargo check --all-targets --all-features"

[tasks.clippy]
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.test]
run = "cargo test --all-targets --all-features"

[tasks.hk-check]
run = "hk check --all"

[tasks.hk-install]
run = "hk install"

[tasks.hk-pre-commit]
run = "hk run pre-commit"

[tasks.openspec-validate]
run = "scripts/ci/validate-openspec-pr.sh"

[tasks.ci]
depends = ["fmt", "check", "clippy", "test"]
